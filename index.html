<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodLine | 數據通靈分析儀</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="src/style_premium.css">

    <!-- JS Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="src/analyze_premium.js"></script>

    <!-- SEO -->
    <meta name="description" content="MoodLine | 暈船分析工具 剖析回覆速度、話題主動性、通話量及暈船指數">
</head>

<body>

    <div class="container">
        <!-- Developer Profile Badge -->
        <div class="dev-badge">
            <img src="img/yuheng.png" alt="yuheng" class="dev-avatar">
            <div class="dev-info">
                <span class="dev-label">AI Engineer</span>
                <span class="dev-name">Yu Heng</span>
            </div>
        </div>

        <!-- Header -->
        <header class="app-header">
            <h1 class="main-title">MoodLine <span style="color: var(--primary)">Premium</span></h1>
            <p class="sub-title">深度解析對話紀錄，探索情感流動的數據真相。專業、精準、洞察人心。</p>

            <div class="upload-card">
                <label for="fileInput" class="upload-btn">
                    </span> 選擇 LINE 聊天紀錄 (.txt)
                </label>
                <input type="file" id="fileInput" class="hidden" accept=".txt">
                <p style="margin-top: 16px; color: var(--text-muted); font-size: 0.875rem;">
                    支援 iOS / Android / Desktop
                </p>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loading" class="hidden" style="text-align: center;">
            <div class="loader-eye">🔮</div>
            <h2 style="font-weight: 800; margin-bottom: 8px;">數據提取中...</h2>
            <p style="color: var(--text-muted);">正在分析語意、回覆模式與通話數據</p>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden"
            style="text-align: center; padding: 24px; color: #ef4444; background: rgba(239, 68, 68, 0.1); border-radius: 16px; margin-bottom: 32px; border: 1px solid rgba(239, 68, 68, 0.2);">
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <div id="dashboard-content">
                <!-- Data will be injected here -->
            </div>

            <!-- Footer -->
            <footer class="app-footer">
                <p>Created by <b>Yu Heng</b></p>
                <p style="margin-top: 8px; opacity: 0.5;">所有分析均在瀏覽器本地完成，保護隱私安全。</p>
            </footer>
        </div>
    </div>

</body>

</html>
